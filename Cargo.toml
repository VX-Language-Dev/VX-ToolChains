[package]
name = "vx_language_compiler"
version = "1.0.0"
edition = "2021"
authors = ["VX Language Team"]
description = "A compiler for the VX programming language with modular architecture"
license = "AGPL-3.0"
repository = "https://github.com/yourusername/vx-language-compiler"

[[bin]]
name = "vxcompiler"
path = "src/ipt.rs"

[[bin]]
name = "vxlinker"
path = "src/vxlinker.rs"

[[bin]]
name = "vx_runtime"
path = "src/main.rs"

[[bin]]
name = "vpm"
path = "src/pm.rs"

[[bin]]
name = "vx-lsp"
path = "src/lsp/main.rs"

[lib]
name = "vx_vm"
path = "src/lib.rs"
crate-type = ["lib"]

[dependencies]
tower-lsp = "0.20"
lsp-types = "0.95"
serde_json = "1.0"
tokio = { version = "1", features = ["full", "io-util"] }
dashmap = "5"

[dev-dependencies]
tempfile = "3.0"

[profile.dev]
opt-level = 0

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
panic = "abort"
strip = true
