[package]
name = "vx_language_compiler"
version = "1.0.0"
edition = "2021"
authors = ["VX Language Team"]
description = "A compiler for the VX programming language with modular architecture"
license = "AGPL-3.0"
repository = "https://github.com/yourusername/vx-language-compiler"

[[bin]]
name = "vxcompiler"
path = "src/ipt.rs"

[[bin]]
name = "vxlinker"
path = "src/vxlinker.rs"

[[bin]]
name = "vx_runtime"
path = "src/main.rs"

[[bin]]
name = "vpm"
path = "src/pm.rs"

[lib]
name = "vx_vm"
path = "src/lib.rs"
crate-type = ["lib", "cdylib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
yaml-rust2 = "0.9"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.0"
tempfile = "3.0"
trycmd = "0.14"

[profile.dev]
opt-level = 0

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
panic = "abort"
strip = true

[features]
default = []
debug_info = []
memory_checking = ["debug_info"]
